<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="An interactive love letter with an opening envelope, a large paper note, and typewriter text."
    />
    <meta name="theme-color" content="#170912" />
    <title>Love Letter</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="scene-noise" aria-hidden="true"></div>
    <div class="background-glow" aria-hidden="true"></div>
    <div class="particles" id="particles" aria-hidden="true"></div>

    <main class="app" id="app">
      <section class="stage" aria-label="Interactive love letter">
        <div class="envelope-wrap" id="envelopeWrap">
          <button class="envelope" id="envelopeButton" type="button" aria-label="Open the envelope">
            <span class="envelope-shadow" aria-hidden="true"></span>
            <svg class="envelope-art" viewBox="0 0 520 380" aria-hidden="true" focusable="false">
              <defs>
                <linearGradient id="envBody" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0" stop-color="#f4cfaa" />
                  <stop offset="0.52" stop-color="#dda37d" />
                  <stop offset="1" stop-color="#bd705d" />
                </linearGradient>
                <linearGradient id="envFront" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0" stop-color="#efc49e" />
                  <stop offset="0.58" stop-color="#db9474" />
                  <stop offset="1" stop-color="#b76356" />
                </linearGradient>
                <linearGradient id="envLight" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0" stop-color="#ffe6c5" />
                  <stop offset="1" stop-color="#e2aa86" />
                </linearGradient>
                <linearGradient id="envFlapOpen" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0" stop-color="#f2bf95" />
                  <stop offset="0.64" stop-color="#d58f70" />
                  <stop offset="1" stop-color="#bd6f5c" />
                </linearGradient>
                <linearGradient id="envFlapClosed" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0" stop-color="#ffdcb9" />
                  <stop offset="0.58" stop-color="#e6a984" />
                  <stop offset="1" stop-color="#c17762" />
                </linearGradient>
                <linearGradient id="paperSmall" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0" stop-color="#fff8ec" />
                  <stop offset="1" stop-color="#ead1b1" />
                </linearGradient>
                <radialGradient id="sealGrad" cx="34%" cy="26%" r="72%">
                  <stop offset="0" stop-color="#da5065" />
                  <stop offset="0.55" stop-color="#9d1730" />
                  <stop offset="1" stop-color="#691021" />
                </radialGradient>
                <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
                  <feDropShadow dx="0" dy="18" stdDeviation="14" flood-color="#13040c" flood-opacity="0.34" />
                </filter>
                <filter id="foldShadow" x="-20%" y="-20%" width="140%" height="140%">
                  <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#743d34" flood-opacity="0.28" />
                </filter>
                <clipPath id="envClip">
                  <path d="M48 128 Q48 103 76 103 H444 Q472 103 472 128 V318 Q472 356 428 356 H92 Q48 356 48 318 Z" />
                </clipPath>
              </defs>

              <g class="env-open-flap">
                <path d="M68 112 L258 23 Q260 21 262 23 L452 112 L452 132 L318 244 Q260 292 202 244 L68 132 Z" />
                <path class="env-flap-highlight" d="M82 111 L258 32 Q260 31 262 32 L438 111" />
              </g>

              <g class="env-body" filter="url(#softShadow)">
                <path class="env-back-panel" d="M48 128 Q48 103 76 103 H444 Q472 103 472 128 V318 Q472 356 428 356 H92 Q48 356 48 318 Z" />
                <path class="env-inner-left" d="M52 146 Q56 121 82 121 H132 L236 217 L80 332 Q52 343 52 316 Z" />
                <path class="env-inner-right" d="M468 146 Q464 121 438 121 H388 L284 217 L440 332 Q468 343 468 316 Z" />
              </g>

              <g class="preview-letter">
                <rect x="105" y="73" width="310" height="230" rx="11" />
                <path d="M128 107 H392 M128 139 H392 M128 171 H392 M128 203 H392 M128 235 H392" />
              </g>

              <g class="env-front" clip-path="url(#envClip)">
                <path class="front-left-svg" d="M48 132 L260 242 L48 356 Z" />
                <path class="front-right-svg" d="M472 132 L260 242 L472 356 Z" />
                <path class="front-bottom-svg" d="M48 356 L228 222 Q260 198 292 222 L472 356 Z" />
                <path class="front-seam-left" d="M48 356 L228 222 Q260 198 292 222 L472 356" />
              </g>

              <g class="env-closed-flap" clip-path="url(#envClip)">
                <path d="M76 103 H444 Q472 103 472 130 V143 L300 257 Q260 283 220 257 L48 143 V130 Q48 103 76 103 Z" />
                <path class="closed-flap-edge" d="M92 139 L220 257 Q260 283 300 257 L428 139" />
              </g>

              <g class="wax-seal-svg">
                <circle cx="260" cy="224" r="29" />
                <circle class="seal-dot seal-dot-left" cx="247" cy="216" r="5" />
                <circle class="seal-dot seal-dot-right" cx="275" cy="209" r="5" />
                <text x="260" y="232" text-anchor="middle">♥</text>
              </g>
            </svg>
          </button>
        </div>

        <article class="letter-dialog" id="letterDialog" aria-live="polite" aria-label="Love letter">
          <div class="paper-shadow" aria-hidden="true"></div>
          <div class="paper">
            <div class="paper-texture" aria-hidden="true"></div>
            <button class="close-letter" id="closeLetter" type="button" aria-label="Close the letter">×</button>
            <p class="typed-message" aria-label="Letter text">
              <span id="typedText"></span><span class="cursor" id="cursor" aria-hidden="true"></span>
            </p>
          </div>
        </article>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
